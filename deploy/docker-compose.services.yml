# Servicios de capacidad. Se levantan con:
#   docker compose -f docker-compose.yml -f docker-compose.services.yml up -d
# El controller los arranca/para después vía docker (activar/desactivar en el panel).

# Límites comunes: en un servidor compartido sin swap, una inferencia sin capar
# hilos puede provocar una tormenta de reclamo de memoria que tumba la máquina
# entera (visto en producción el 2026-07-17: load average >300).
x-ml-limits: &ml-limits
  OMP_NUM_THREADS: "2"
  OPENBLAS_NUM_THREADS: "2"
  MKL_NUM_THREADS: "2"
  TOKENIZERS_PARALLELISM: "false"
  MEMORY_MARGIN_MB: "1024"

services:
  svc-embeddings:
    build: { context: .., dockerfile: services/embeddings/Dockerfile }
    image: aihub-svc-embeddings
    container_name: aihub-svc-embeddings
    environment:
      <<: *ml-limits
      DATABASE_URL: postgresql://aihub:${POSTGRES_PASSWORD:?}@postgres:5432/aihub
      DATA_DIR: /data
      MODELS_DIR: /models
      SERVICE_URL: http://svc-embeddings:8000
      SERVICE_CONTAINER: aihub-svc-embeddings
    volumes:
      - data:/data
      - models:/models
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    networks: [aihub]

  svc-ocr:
    build: { context: .., dockerfile: services/ocr/Dockerfile }
    image: aihub-svc-ocr
    container_name: aihub-svc-ocr
    environment:
      <<: *ml-limits
      DATABASE_URL: postgresql://aihub:${POSTGRES_PASSWORD:?}@postgres:5432/aihub
      DATA_DIR: /data
      MODELS_DIR: /models
      SERVICE_URL: http://svc-ocr:8000
      SERVICE_CONTAINER: aihub-svc-ocr
    volumes:
      - data:/data
      - models:/models
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    mem_limit: 2500m
    cpus: 3
    networks: [aihub]

  svc-speech:
    build: { context: .., dockerfile: services/speech/Dockerfile }
    image: aihub-svc-speech
    container_name: aihub-svc-speech
    environment:
      <<: *ml-limits
      DATABASE_URL: postgresql://aihub:${POSTGRES_PASSWORD:?}@postgres:5432/aihub
      DATA_DIR: /data
      MODELS_DIR: /models
      SERVICE_URL: http://svc-speech:8000
      SERVICE_CONTAINER: aihub-svc-speech
      JOB_CONCURRENCY: "1"
    volumes:
      - data:/data
      - models:/models
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    mem_limit: 2500m
    cpus: 3
    networks: [aihub]

  svc-tts:
    build: { context: .., dockerfile: services/tts/Dockerfile }
    image: aihub-svc-tts
    container_name: aihub-svc-tts
    environment:
      <<: *ml-limits
      DATABASE_URL: postgresql://aihub:${POSTGRES_PASSWORD:?}@postgres:5432/aihub
      DATA_DIR: /data
      MODELS_DIR: /models
      SERVICE_URL: http://svc-tts:8000
      SERVICE_CONTAINER: aihub-svc-tts
      JOB_CONCURRENCY: "1"
    volumes:
      - data:/data
      - models:/models
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    mem_limit: 5g
    cpus: 4
    networks: [aihub]
